<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notedown Sync Setup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <script defer src="{{ url_for('static', filename='auth.js') }}"></script>
  </head>
  <body data-mode="setup">
    <main class="auth-shell">
      <section class="auth-panel">
        <header>
          <h1>초기 관리자 설정</h1>
          <p>처음 사용할 관리자 아이디와 비밀번호를 설정하세요.</p>
        </header>
        <form id="auth-form">
          <label>
            <span>아이디</span>
            <input id="username" autocomplete="username" required>
          </label>
          <label>
            <span>비밀번호</span>
            <input id="password" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <label>
            <span>비밀번호 확인</span>
            <input id="password-confirm" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <button type="submit">설정 완료</button>
        </form>
        <p id="auth-message" class="message" role="alert"></p>
      </section>
    </main>
  </body>
</html>
